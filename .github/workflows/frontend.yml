name: Deploy Frontend

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to blob storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name cloudresumeweb \
              --destination '$web' \
              --source . \
              --overwrite \
              --pattern '*.html' \
              --no-progress
            az storage blob upload-batch \
              --account-name cloudresumeweb \
              --destination '$web' \
              --source . \
              --overwrite \
              --pattern 'css/*' \
              --no-progress
            az storage blob upload-batch \
              --account-name cloudresumeweb \
              --destination '$web' \
              --source . \
              --overwrite \
              --pattern 'js/*' \
              --no-progress

      - name: Purge Front Door endpoint
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az afd endpoint purge \
              --resource-group cloudresume-rg \
              --profile-name cloudresume-cdn \
              --endpoint-name cloudresume-endpoint \
              --content-paths '/*'

      - name: Azure Logout
        run: az logout
